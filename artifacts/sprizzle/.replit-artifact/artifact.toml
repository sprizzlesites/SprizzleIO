kind = "web"
previewPath = "/"
title = "Sprizzle"
version = "1.0.0"
id = "artifacts/sprizzle"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23031

[services.development]
run = "pnpm --filter @workspace/sprizzle run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sprizzle", "run", "build" ]
publicDir = "artifacts/sprizzle/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23031"
BASE_PATH = "/"
